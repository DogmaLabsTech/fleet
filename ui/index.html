<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Fleet</title>
<link rel="icon" href="/fleet.ico">
<link rel="stylesheet" href="/app.css">
</head>
<body>

<!-- ============ MISSION CONTROL (default view) ============ -->
<div id="mission">
  <header id="mission-head">
    <h1>FLEET <span class="mc-sub">Mission Control</span></h1>
    <div id="mission-counts" class="mono dim">connecting…</div>
    <button id="to-sessions" class="switch">SESSIONS &rarr;</button>
  </header>
  <div id="ring-legend">
    <span><b class="lg-verified">◉</b> verified — independent artifact</span>
    <span><b class="lg-attested">◯</b> attested — provenance cited</span>
    <span><b class="lg-uncited">◌</b> uncited — no receipt</span>
  </div>
  <div id="spawn-strip" hidden></div>
  <div id="project-grid"></div>
</div>

<!-- project drawer: milestones + team for one repo -->
<div id="drawer" hidden>
  <div id="drawer-scrim"></div>
  <aside id="drawer-panel">
    <header id="drawer-head">
      <div id="dr-ring"></div>
      <div>
        <div id="dr-title"></div>
        <div id="dr-sub" class="mono dim"></div>
      </div>
      <button id="dr-close" aria-label="close">&times;</button>
    </header>
    <div id="dr-actions"></div>
    <section id="dr-milestones"></section>
    <section id="dr-team"></section>
  </aside>
</div>

<!-- ============ SESSIONS (the original master–detail) ============ -->
<div id="shell" hidden>
  <aside id="rail">
    <header id="rail-head">
      <button id="to-mission" class="switch">&larr; MISSION</button>
      <h1>Session <b>Fleet</b></h1>
      <div id="counts" class="mono dim">connecting…</div>
    </header>
    <div id="session-list"></div>
    <div id="stopped-list"></div>
    <footer id="rail-foot"><button id="srv-stop">⏻ stop server</button></footer>
  </aside>
  <main id="detail">
    <div id="detail-empty">select a session</div>
    <div id="detail-body" hidden>
      <header id="detail-head">
        <span id="d-dot" class="dot"></span>
        <div id="d-titles">
          <div id="d-project"></div>
          <div id="d-title" class="dim"></div>
        </div>
        <div id="d-meta" class="mono dim"></div>
        <button id="d-copy">copy id</button>
        <button id="d-kill" class="danger">✕ end session</button>
      </header>
      <nav id="tabs">
        <button class="tab active" data-tab="head">HEAD</button>
        <button class="tab" data-tab="vault">VAULT WEB</button>
        <button class="tab" data-tab="timeline">TIMELINE</button>
      </nav>
      <section id="tab-head" class="tab-body"></section>
      <section id="tab-vault" class="tab-body" hidden>
        <canvas id="graph"></canvas>
        <div id="vault-empty" hidden></div>
      </section>
      <section id="tab-timeline" class="tab-body" hidden></section>
    </div>
  </main>
</div>

<div id="spawnlog" hidden>
  <div id="sl-scrim"></div>
  <div id="sl-box">
    <header id="sl-head"><span id="sl-title" class="mono"></span><button id="sl-close" aria-label="close">&times;</button></header>
    <pre id="sl-body" class="mono"></pre>
  </div>
</div>
<div id="toasts"></div>
<div id="confirm" hidden>
  <div id="confirm-box">
    <p id="confirm-text"></p>
    <div>
      <button id="confirm-yes" class="danger">Confirm</button>
      <button id="confirm-no">Cancel</button>
    </div>
  </div>
</div>
<script src="/app.js"></script>
</body>
</html>
